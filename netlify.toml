[build]
  command = "pnpm run build"
  publish = ".next"

[build.environment]
  # Next 16 requires Node 20+.
  NODE_VERSION = "20"
  # NEXT_PUBLIC_* env vars are inlined into the client bundle by Next.js — that
  # is the contract of the prefix. The Firebase Web SDK keys are public by
  # design; security comes from Auth rules + App Check, not key secrecy.
  # Server-only secrets (FIREBASE_PRIVATE_KEY, FIREBASE_CLIENT_EMAIL) are NOT
  # listed here — they must continue to fail the scanner if ever leaked.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_APP_ENV"
  # Skip scanning generated build artifacts where NEXT_PUBLIC_* values are
  # legitimately inlined. Source tree and functions are still scanned.
  SECRETS_SCAN_OMIT_PATHS = ".next/**,.netlify/**,node_modules/**"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.deploy-preview]
  skip = true